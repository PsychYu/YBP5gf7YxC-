<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家具配置レイアウト</title>
<style>
  :root {
    --bg-1: #ffffff;
    --bg-2: #f7f6f3;
    --bg-3: #efece6;
    --ink-1: #1f1e1d;
    --ink-2: #595754;
    --ink-3: #8a8782;
    --line: #e3dfd8;
    --line-2: #d4cfc4;
    --info: #2563eb;
    --info-soft: rgba(37, 99, 235, 0.10);
    --success: #15803d;
    --success-soft: rgba(21, 128, 61, 0.10);
    --warn: #b45309;
    --warn-soft: rgba(180, 83, 9, 0.10);
    --danger: #b91c1c;
    --danger-soft: rgba(185, 28, 28, 0.10);
    --paper: #ffffff;
    --r-sm: 5px;
    --r-md: 7px;
    --r-lg: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-1: #1a1917;
      --bg-2: #232220;
      --bg-3: #2c2b28;
      --ink-1: #f0ede6;
      --ink-2: #b8b5af;
      --ink-3: #807d77;
      --line: #3a3835;
      --line-2: #4a4843;
      --info: #6ba1ff;
      --info-soft: rgba(107, 161, 255, 0.14);
      --success: #4ade80;
      --success-soft: rgba(74, 222, 128, 0.12);
      --warn: #f59e0b;
      --warn-soft: rgba(245, 158, 11, 0.14);
      --danger: #f87171;
      --danger-soft: rgba(248, 113, 113, 0.14);
      --paper: #f5f3ed;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    background: var(--bg-1);
    color: var(--ink-1);
    font-size: 14px;
    line-height: 1.5;
  }

  .lt {
    width: 100%; max-width: 1120px;
    margin: 0 auto; padding: 18px 16px 24px;
  }

  .ttl {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .ttl h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .ttl .sub { font-size: 12.5px; color: var(--ink-2); }

  .cb {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin: 0 0 12px; align-items: center;
  }
  .cb button {
    font-size: 12.5px; padding: 5px 11px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--ink-1);
    border-radius: var(--r-md);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    line-height: 1.4;
  }
  .cb button:hover { background: var(--bg-3); border-color: var(--line-2); }
  .cb button:active { transform: translateY(0.5px); }
  .cb button.act {
    background: var(--info); border-color: var(--info); color: #fff;
  }
  .cb button.sv {
    background: var(--success-soft);
    border-color: rgba(21, 128, 61, 0.35);
    color: var(--success);
  }
  .cb button.sv:hover { background: rgba(21, 128, 61, 0.18); }
  .cb button.ad {
    background: var(--warn-soft);
    border-color: rgba(180, 83, 9, 0.35);
    color: var(--warn);
  }
  .cb button.ad:hover { background: rgba(180, 83, 9, 0.18); }
  .cb button.rm {
    color: var(--danger);
  }
  .cb button.rm:hover {
    background: var(--danger-soft);
    border-color: rgba(185, 28, 28, 0.35);
  }
  .sep {
    display: inline-block; width: 1px; height: 20px;
    background: var(--line); margin: 0 5px;
  }
  .ts {
    display: none;
    font-size: 12px;
    color: var(--info);
    background: var(--info-soft);
    padding: 4px 10px;
    border-radius: var(--r-md);
    margin-left: auto;
    animation: tsin 0.2s ease;
  }
  .ts.show { display: inline-block; }
  @keyframes tsin { from { opacity: 0; transform: translateX(4px); } to { opacity: 1; transform: translateX(0); } }

  .pn {
    margin: 0 0 12px;
    padding: 10px 14px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    font-size: 12.5px;
    animation: pnin 0.15s ease;
  }
  .pn.hide { display: none; }
  @keyframes pnin { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
  .pn .pt {
    font-weight: 500; margin-bottom: 8px;
    color: var(--ink-1);
    display: flex; align-items: center; gap: 8px;
  }
  .pn .tk {
    font-size: 11px; color: var(--ink-3);
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    background: var(--bg-1);
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: normal;
  }
  .pn .pt .rs {
    margin-left: auto;
    color: var(--info);
    font-size: 11px;
    cursor: pointer;
    font-weight: normal;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .pn .pt .rs.hide { display: none; }
  .pn .pr {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .pn label {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--ink-2);
  }
  .pn input[type="text"] {
    width: 140px;
    padding: 4px 8px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-1);
    border-radius: var(--r-sm);
    font-size: 12.5px;
    font-family: inherit;
  }
  .pn input[type="number"] {
    width: 60px;
    padding: 4px 8px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-1);
    border-radius: var(--r-sm);
    font-size: 12.5px;
    font-family: inherit;
  }
  .pn input[type="color"] {
    width: 32px; height: 26px;
    padding: 0;
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    background: transparent;
    cursor: pointer;
  }
  .pn select {
    padding: 4px 8px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-1);
    border-radius: var(--r-sm);
    font-size: 12.5px;
    font-family: inherit;
  }
  .pn button {
    font-size: 12px; padding: 4px 11px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-1);
    border-radius: var(--r-md);
    cursor: pointer;
    font-family: inherit;
  }
  .pn button:hover { border-color: var(--info); color: var(--info); }
  .pn button.pri { background: var(--info); border-color: var(--info); color: #fff; }
  .pn button.pri:hover { background: var(--info); opacity: 0.9; }
  .pn .gap { flex: 1; }
  .pn .pr.spacer { margin-left: auto; display: inline-flex; }

  .flframe {
    position: relative;
    width: 100%;
    aspect-ratio: 1.9380;
    background: var(--paper);
    border-radius: var(--r-lg);
    border: 1px solid var(--line);
    overflow: hidden;
    transition: aspect-ratio 0.25s ease;
  }
  .flframe.rot {
    aspect-ratio: calc(1 / 1.9380);
  }
  .fl {
    position: absolute;
    inset: 0;
    user-select: none;
    touch-action: none;
    transform-origin: 0 0;
    /* rotated 状態では JS が width/height/transform を上書き */
  }
  .fl svg.fp {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .fl.no-dim svg.fp .dim-text { display: none; }
  .fl.no-axis svg.fp .axis-line { display: none; }
  .fl.no-doors svg.fp .door-marks { display: none; }

  .fn {
    position: absolute;
    box-sizing: border-box;
    border: 1.5px solid;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1.1;
    color: #fff;
    cursor: grab;
    touch-action: none;
    transition: box-shadow 0.15s ease;
    transform-origin: center center;
    overflow: visible;
  }
  .fn:hover { filter: brightness(1.08); z-index: 10; }
  /* 選択時は外形を変えずに内側に色を載せる(box-shadowはinset, outlineは-offsetで内側) */
  .fn.sel {
    z-index: 20;
    outline: 2px solid var(--info);
    outline-offset: -2px;
    box-shadow: inset 0 0 0 0 var(--info), 0 0 8px rgba(37, 99, 235, 0.35);
  }
  .fn.drg { cursor: grabbing; opacity: 0.85; z-index: 30; }
  .fn .nm {
    pointer-events: none;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    padding: 1px 3px;
    text-shadow: 0 1px 2px rgba(0,0,0,.45);
  }
  .fn .dw, .fn .dd {
    position: absolute; pointer-events: none;
    font-size: 9.5px;
    font-weight: 600;
    white-space: nowrap;
    color: var(--ink-1);
    text-shadow: 0 0 3px var(--paper), 0 0 3px var(--paper);
  }
  .fn .dw { top: -12px; left: 50%; transform: translateX(-50%); }
  .fn .dd { left: -8px; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: center; }
  .fn.no-d .dw, .fn.no-d .dd { display: none; }

  .if {
    margin-top: 12px;
    font-size: 11.5px;
    color: var(--ink-2);
    line-height: 1.7;
  }
  .if kbd {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-bottom-width: 1.5px;
    border-radius: 3px;
    padding: 0 5px;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 11px;
    color: var(--ink-1);
  }
  .if .dot { color: var(--ink-3); margin: 0 6px; }

  @media (max-width: 640px) {
    .lt { padding: 12px 10px 20px; }
    .ttl h1 { font-size: 15px; }
    .pn input[type="text"] { width: 110px; }
  }
</style>
</head>
<body>

<div class="lt">
  <div class="ttl">
    <h1>家具配置レイアウト</h1>
    <span class="sub">三泉ビル · 1,258 × 648 cm (約 81.5 m²) · 扉 8</span>
  </div>

  <div class="cb">
    <button class="ad" onclick="oa()">＋ 家具追加</button>
    <button onclick="rt()" title="選択した家具を90°回転 (R)">↻ 回転</button>
    <button onclick="dl()" class="rm" title="選択した家具を削除 (Delete)">削除</button>
    <button onclick="cp()">クリア</button>
    <span class="sep"></span>
    <button onclick="td()" id="bt-dim" class="act">寸法</button>
    <button onclick="rf()" id="bt-rotfl" title="図面の縦/横を切替">⇄ 縦横</button>
    <span class="sep"></span>
    <button class="sv" onclick="sv()">🔗 URL保存</button>
    <span id="ts" class="ts"></span>
  </div>

  <div id="ep" class="pn hide">
    <div class="pt">
      選択中の家具を編集
      <span id="ek" class="tk"></span>
      <a class="rs hide" id="ers" onclick="rs()">↺ デフォルトに戻す</a>
    </div>
    <div class="pr">
      <label>名前 <input type="text" id="en" maxlength="20"></label>
      <label>幅 <input type="number" id="ew" min="10" max="600" step="1"> cm</label>
      <label>奥行 <input type="number" id="ed" min="10" max="600" step="1"> cm</label>
      <label>色 <input type="color" id="ec"></label>
      <button class="pri" onclick="ae()">適用</button>
      <button onclick="ce()">閉じる</button>
    </div>
  </div>

  <div id="ap" class="pn hide">
    <div class="pt">新しい家具を追加</div>
    <div class="pr">
      <label>タイプ
        <select id="atype">
          <option value="__new__">＋ 新規タイプを作成</option>
        </select>
      </label>
      <span id="anew">
        <label>キー <input type="text" id="an_k" placeholder="bookshelf" pattern="[a-zA-Z0-9_-]+"></label>
        <label>名前 <input type="text" id="an" placeholder="本棚" maxlength="20"></label>
        <label>幅 <input type="number" id="aw" placeholder="100" min="10" max="600" step="1"> cm</label>
        <label>奥行 <input type="number" id="ad" placeholder="30" min="10" max="600" step="1"> cm</label>
        <label>色 <input type="color" id="ac" value="#5b9eff"></label>
      </span>
      <button class="pri" onclick="ca()">追加</button>
      <button onclick="cl()">キャンセル</button>
    </div>
  </div>

  <div class="flframe" id="flframe">
    <div class="fl no-axis" id="fl">
      <svg class="fp" viewBox="0 0 13625.0 7030.4" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">

t-size="125">155</text><text x="13582.5" y="4370.8" font-size="125" transform="rotate(-90.0 13582.5 4370.8)">377.5</text><text x="13279.9" y="3938.3" font-size="125" transform="rotate(-90.0 13279.9 3938.3)">207</text><text x="13279.9" y="2705.8" font-size="125" transform="rotate(-90.0 13279.9 2705.8)">27</text><text x="12978.8" y="3688.3" font-size="125" transform="rotate(-90.0 12978.8 3688.3)">157</text><text x="5745.4" y="4735.8" font-size="125" transform="rotate(-90.0 5745.4 4735.8)">74</text><text x="11060.4" y="5505.8" font-size="125" transform="rotate(-90.0 11060.4 5505.8)">80</text><text x="12067.5" y="5455.8" font-size="125" transform="rotate(-90.0 12067.5 5455.8)">90</text></g>

  <div class="if">
    家具をクリックで編集パネル<span class="dot">·</span>
    ドラッグで移動(壁内クランプ)<span class="dot">·</span>
    <kbd>R</kbd> 回転<span class="dot">·</span>
    <kbd>Delete</kbd> 削除<span class="dot">·</span>
    <kbd>Esc</kbd> 選択解除
  </div>
</div>

<script>
"use strict";
(function () {
  const VB_W = 13625.0;
  const VB_H = 7030.4;
  const WB = { xmin: 0.0, ymin: 5.4, xmax: 1258.0, ymax: 653.6 };

  const DF = {
    sofa:   { l: 'ソファ',     w: 160, d: 95,  c: '#d85a30' },
    dining: { l: 'ダイニング', w: 80,  d: 80,  c: '#c89b3c' },
    tv:     { l: 'TV+TV台',    w: 120, d: 45,  c: '#5b6770' },
    desk:   { l: 'デスク',     w: 60,  d: 45,  c: '#8b6f47' },
    bed:    { l: 'ベッド',     w: 100, d: 220, c: '#4a7c8e' },
    piano:  { l: 'ピアノ',     w: 140, d: 50,  c: '#2d3436' },
  };
  const DEFAULT_LAYOUT = [{t:'sofa',cx:365,cy:281,r:0},{t:'tv',cx:365,cy:411,r:0},{t:'dining',cx:585,cy:281,r:0},{t:'desk',cx:805,cy:281,r:0},{t:'bed',cx:937,cy:378,r:90},{t:'piano',cx:211,cy:330,r:90}];

  let FM = {};      // 実効家具マスタ
  let cm_ = {};     // カスタム差分
  let ps = [];      // 配置 [{t, cx, cy, r, e}]
  let se = null;    // 選択中
  let showDim = true;
  let rotated = false;   // 図面の縦/横
  let manualRot = false; // 手動操作でROT状態を変えたか

  const fl = document.getElementById('fl');
  const flframe = document.getElementById('flframe');

  // モバイル縦画面検出 → 既定で縦表示
  function preferPortrait() {
    return window.matchMedia('(max-width: 640px) and (orientation: portrait)').matches;
  }
  rotated = preferPortrait();

  // 回転適用 (CSS transform で .fl を90°CW + 寸法スワップ)
  function applyRotation() {
    flframe.classList.toggle('rot', rotated);
    document.getElementById('bt-rotfl').classList.toggle('act', rotated);
    if (rotated) {
      const r = flframe.getBoundingClientRect();
      // 余白がない瞬間に呼ばれると 0 になりうるので保護
      if (r.width && r.height) {
        fl.style.width = r.height + 'px';
        fl.style.height = r.width + 'px';
        fl.style.transform = 'translate(' + r.width + 'px, 0) rotate(90deg)';
      }
    } else {
      fl.style.width = '';
      fl.style.height = '';
      fl.style.transform = '';
    }
  }

  function rb() {
    FM = {};
    for (const k in DF) FM[k] = Object.assign({}, DF[k]);
    for (const k in cm_) FM[k] = Object.assign({}, FM[k] || {}, cm_[k]);
  }

  function rgba(h, a) {
    const m = h.replace('#', '').match(/.{2}/g) || ['88','88','88'];
    return `rgba(${parseInt(m[0],16)},${parseInt(m[1],16)},${parseInt(m[2],16)},${a})`;
  }

  // 家具DOM生成
  function mk(p) {
    const el = document.createElement('div');
    el.className = 'fn' + (showDim ? '' : ' no-d');
    el.innerHTML = '<div class="dw"></div><div class="dd"></div><div class="nm"></div>';
    el.addEventListener('pointerdown', (ev) => pd(ev, p));
    fl.appendChild(el);
    p.e = el;
    rp(p);
  }
  function rp(p) {
    const s = FM[p.t];
    if (!s) return;
    p.e.style.background = rgba(s.c, 0.5);
    p.e.style.borderColor = rgba(s.c, 0.95);
    p.e.querySelector('.dw').textContent = 'W' + s.w;
    p.e.querySelector('.dd').textContent = 'D' + s.d;
    p.e.querySelector('.nm').textContent = s.l;
    at(p);
  }
  // cm 座標 -> viewBox 内 % へ
  function at(p) {
    const s = FM[p.t];
    const cx_mm = p.cx * 10;
    const cy_mm = p.cy * 10;
    const w_mm = s.w * 10;
    const h_mm = s.d * 10;
    p.e.style.left = ((cx_mm - w_mm/2) / VB_W * 100) + '%';
    p.e.style.top = ((cy_mm - h_mm/2) / VB_H * 100) + '%';
    p.e.style.width = (w_mm / VB_W * 100) + '%';
    p.e.style.height = (h_mm / VB_H * 100) + '%';
    p.e.style.transform = 'rotate(' + p.r + 'deg)';
  }
  function cp_() {
    ps.forEach(p => p.e && p.e.remove());
    ps = []; se = null; ce();
  }
  function add(t, cx, cy, r) {
    const p = { t, cx, cy, r };
    ps.push(p);
    mk(p);
    return p;
  }
  function clamp(p) {
    const s = FM[p.t];
    const vW = p.r % 180 === 0 ? s.w : s.d;
    const vH = p.r % 180 === 0 ? s.d : s.w;
    p.cx = Math.max(WB.xmin + vW/2, Math.min(WB.xmax - vW/2, p.cx));
    p.cy = Math.max(WB.ymin + vH/2, Math.min(WB.ymax - vH/2, p.cy));
  }

  // 選択
  function sp(p) {
    if (se && se !== p) se.e.classList.remove('sel');
    se = p;
    if (p) { p.e.classList.add('sel'); oe(p); }
    else ce();
  }
  function oe(p) {
    const ep = document.getElementById('ep');
    ep.classList.remove('hide');
    document.getElementById('ap').classList.add('hide');
    const s = FM[p.t];
    document.getElementById('ek').textContent = p.t;
    document.getElementById('en').value = s.l;
    document.getElementById('ew').value = s.w;
    document.getElementById('ed').value = s.d;
    document.getElementById('ec').value = s.c;
    const ers = document.getElementById('ers');
    ers.classList.toggle('hide', !cm_[p.t] || !DF[p.t]);
  }
  function ce() {
    document.getElementById('ep').classList.add('hide');
    if (se && se.e) se.e.classList.remove('sel');
    se = null;
  }
  window.ce = ce;

  // 編集適用
  window.ae = () => {
    if (!se) return;
    const l = document.getElementById('en').value.trim();
    const w = +document.getElementById('ew').value;
    const d = +document.getElementById('ed').value;
    const c = document.getElementById('ec').value;
    if (!l || !(w > 0) || !(d > 0)) { st('値を確認してください'); return; }
    cm_[se.t] = { l, w, d, c };
    rb();
    ps.forEach(p => { if (p.t === se.t) { clamp(p); rp(p); } });
    oe(se);
    pu();
    st('「' + l + '」に反映');
  };
  window.rs = () => {
    if (!se || !DF[se.t]) return;
    delete cm_[se.t];
    rb();
    ps.forEach(p => { if (p.t === se.t) { clamp(p); rp(p); } });
    oe(se);
    pu();
    st('デフォルトに戻しました');
  };

  // 追加パネル
  window.oa = () => {
    const ap = document.getElementById('ap');
    ce();
    ap.classList.remove('hide');
    // タイプセレクトを既存マスタで埋める
    const sel = document.getElementById('atype');
    sel.innerHTML = '';
    Object.entries(FM).forEach(([k, v]) => {
      const o = document.createElement('option');
      o.value = k; o.textContent = `${v.l} (${v.w}×${v.d}) — ${k}`;
      sel.appendChild(o);
    });
    const sep_ = document.createElement('option');
    sep_.disabled = true; sep_.textContent = '──────────';
    sel.appendChild(sep_);
    const nu = document.createElement('option');
    nu.value = '__new__'; nu.textContent = '＋ 新規タイプを作成';
    sel.appendChild(nu);
    sel.value = Object.keys(FM)[0];
    ut();
  };
  window.cl = () => document.getElementById('ap').classList.add('hide');
  document.addEventListener('change', (e) => {
    if (e.target.id === 'atype') ut();
  });
  function ut() {
    const v = document.getElementById('atype').value;
    document.getElementById('anew').style.display = (v === '__new__') ? 'inline-flex' : 'none';
  }
  window.ca = () => {
    const sel = document.getElementById('atype').value;
    let t;
    if (sel === '__new__') {
      const k = document.getElementById('an_k').value.trim();
      const l = document.getElementById('an').value.trim();
      const w = +document.getElementById('aw').value;
      const d = +document.getElementById('ad').value;
      const c = document.getElementById('ac').value;
      if (!/^[a-zA-Z0-9_-]+$/.test(k) || !l || !(w > 0) || !(d > 0)) {
        st('入力値を確認してください'); return;
      }
      if (FM[k]) { st('そのキーは既に存在します'); return; }
      cm_[k] = { l, w, d, c };
      rb();
      t = k;
    } else {
      t = sel;
    }
    const cx = Math.round((WB.xmin + WB.xmax) / 2);
    const cy = Math.round((WB.ymin + WB.ymax) / 2);
    const p = add(t, cx, cy, 0);
    clamp(p); at(p);
    sp(p);
    document.getElementById('ap').classList.add('hide');
    pu();
    st('追加しました');
  };

  // 回転・削除
  window.rt = () => {
    if (!se) { st('家具を選んでから'); return; }
    se.r = (se.r + 90) % 360;
    clamp(se); at(se);
    pu();
  };
  window.dl = () => {
    if (!se) return;
    se.e.remove();
    ps = ps.filter(p => p !== se);
    se = null; ce();
    pu();
  };
  window.cp = () => {
    if (ps.length === 0) return;
    if (confirm('全ての家具を削除しますか?')) { cp_(); pu(); }
  };
  window.td = () => {
    showDim = !showDim;
    document.getElementById('bt-dim').classList.toggle('act', showDim);
    fl.classList.toggle('no-dim', !showDim);
    ps.forEach(p => p.e && p.e.classList.toggle('no-d', !showDim));
  };
  window.rf = () => {
    rotated = !rotated;
    manualRot = true;
    applyRotation();
    st(rotated ? '縦表示' : '横表示');
  };

  // ドラッグ (rotated 状態のときは画面上の dX/dY を建物座標系に逆変換して反映)
  function pd(ev, p) {
    if (ev.button !== undefined && ev.button !== 0) return;
    ev.preventDefault(); ev.stopPropagation();
    sp(p);
    const fr = flframe.getBoundingClientRect();
    // .fl の自然サイズ(rotated でも回転前の論理サイズ)
    const nat_w = rotated ? fr.height : fr.width;
    const nat_h = rotated ? fr.width : fr.height;
    const k_x = VB_W / nat_w / 10;
    const k_y = VB_H / nat_h / 10;
    const sX = p.cx, sY = p.cy;
    const pX = ev.clientX, pY = ev.clientY;
    let moved = false;
    p.e.classList.add('drg');
    try { p.e.setPointerCapture(ev.pointerId); } catch (_) {}
    const pm = (e) => {
      const dX = e.clientX - pX;
      const dY = e.clientY - pY;
      // rotated=true(CSS rotate 90°CW) のとき、画面X右は建物Y下、画面Y下は建物X左に対応
      const dx_nat = rotated ? dY : dX;
      const dy_nat = rotated ? -dX : dY;
      if (!moved && Math.hypot(dX, dY) > 0.5) moved = true;
      p.cx = sX + dx_nat * k_x;
      p.cy = sY + dy_nat * k_y;
      clamp(p);
      at(p);
    };
    const up = (e) => {
      p.e.classList.remove('drg');
      try { p.e.releasePointerCapture(ev.pointerId); } catch (_) {}
      p.e.removeEventListener('pointermove', pm);
      p.e.removeEventListener('pointerup', up);
      p.e.removeEventListener('pointercancel', up);
      if (moved) pu();
    };
    p.e.addEventListener('pointermove', pm);
    p.e.addEventListener('pointerup', up);
    p.e.addEventListener('pointercancel', up);
  }

  // 空白クリックで選択解除
  fl.addEventListener('pointerdown', (e) => {
    if (e.target === fl || e.target.tagName === 'svg' || e.target.tagName === 'SVG') {
      ce();
    }
  });

  // URL ハッシュ
  function eh(s) { return encodeURIComponent(s); }
  function pu() {
    const F = Object.entries(cm_).map(([k, v]) =>
      [k, eh(v.l), v.w, v.d, eh(v.c)].join(',')
    ).join(';');
    const L = ps.map(p =>
      [p.t, Math.round(p.cx), Math.round(p.cy), p.r | 0].join(',')
    ).join(';');
    history.replaceState(null, '', '#F=' + F + '&L=' + L);
  }
  function lu() {
    const h = location.hash.replace(/^#/, '');
    const o = {};
    h.split('&').forEach(x => {
      const i = x.indexOf('=');
      if (i > 0) o[x.slice(0, i)] = x.slice(i + 1);
    });
    cm_ = {};
    if (o.F) {
      o.F.split(';').filter(Boolean).forEach(e => {
        const [k, l, w, d, c] = e.split(',');
        if (!k) return;
        cm_[k] = {
          l: decodeURIComponent(l || k),
          w: +w || 100, d: +d || 50,
          c: decodeURIComponent(c || '#888888'),
        };
      });
    }
    rb();
    cp_();
    let init_ = [];
    if (o.L) {
      o.L.split(';').filter(Boolean).forEach(e => {
        const [t, cx, cy, r] = e.split(',');
        if (FM[t]) init_.push({ t, cx: +cx, cy: +cy, r: +r || 0 });
      });
    }
    if (init_.length === 0) init_ = DEFAULT_LAYOUT.map(p => ({ ...p }));
    init_.forEach(p => {
      const np = add(p.t, p.cx, p.cy, p.r);
      clamp(np); at(np);
    });
  }
  window.addEventListener('hashchange', lu);

  // URL保存
  window.sv = async () => {
    pu();
    const u = location.href;
    let ok = false;
    if (navigator.clipboard && window.isSecureContext) {
      try { await navigator.clipboard.writeText(u); ok = true; } catch (_) {}
    }
    if (!ok) {
      const ta = document.createElement('textarea');
      ta.value = u; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { ok = document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta);
    }
    st(ok ? 'URLをコピーしました' : 'アドレスバーからコピーしてください');
  };

  // トースト
  let tt;
  function st(m) {
    const t = document.getElementById('ts');
    t.textContent = m; t.classList.add('show');
    clearTimeout(tt);
    tt = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // キーボード
  window.addEventListener('keydown', (e) => {
    if (/INPUT|SELECT|TEXTAREA/.test(e.target.tagName)) return;
    if (e.key === 'r' || e.key === 'R') window.rt();
    else if (e.key === 'Delete' || e.key === 'Backspace') { if (se) { e.preventDefault(); window.dl(); } }
    else if (e.key === 'Escape') ce();
  });

  // 画面サイズ変化に追従(回転中のみ寸法を再計算)
  window.addEventListener('resize', () => {
    if (!manualRot) {
      const want = preferPortrait();
      if (want !== rotated) rotated = want;
    }
    applyRotation();
  });

  // 初期化
  rb();
  lu();
  // フォントやレイアウトの確定後に回転を適用
  requestAnimationFrame(applyRotation);
})();
</script>
